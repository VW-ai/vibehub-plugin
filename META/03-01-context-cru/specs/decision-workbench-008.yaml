spec_id: "decision-workbench-008"
type: decision
state: active
intent:
  summary: "MCP 提供确定性、可发现、带质量闸的 capabilities；knowledge workflow 由 skills 编排"
  detail: |
    当前 capability surface 包括 register_scope、self_report、kb_retrieve、
    kb_operation、distill_operation 与 get_manual。Capability 负责 schema
    validation、identity、transaction、integrity 与 factual receipt；它不替
    agent 做语义判断。

    Knowledge write 必须经过唯一 dispatcher/operation contract。不存在稳定
    contract 的 mutation 不应以名字暴露成“看起来能写、实际必失败”的工具。
constraints:
  - kind: must
    rule: "MCP capability schema、operation version 与 result evidence 必须可验证"
  - kind: must
    rule: "Canonical writes 必须通过共享 dispatcher，不得绕过 integrity boundary"
  - kind: must_not
    rule: "Tool description 不得复制完整 ingest/distill/query workflow"
indexing:
  type: decision
  priority: P0
  layer: feature
  domain: "context-cru"
  tags: [mcp, capabilities, operation-contracts, dispatcher, validation]
provenance:
