spec_id: "change-2026-07-18-setup-skill"
type: change
state: active
intent:
  summary: "Implemented prompt-first setup intelligence as a progressive skill packaged for both hosts"
  detail: |
    The setup skill sequences inspect, apply and status; classifies fresh,
    existing and ambiguous repositories; recommends optional cold-start
    distillation; and stops on partial or blocked activation with recovery
    evidence. Core and CLI remain deterministic primitives.
constraints:
  - kind: must
    rule: "Repository classification, workflow sequencing and recovery choice remain skill intelligence"
  - kind: must
    rule: "A partial, blocked or unhealthy apply stops the workflow and preserves recovery evidence"
  - kind: must_not
    rule: "Do not fabricate query or ingest evidence to advance Activated"
