spec_id: "change-2026-07-12-m2-skill-intelligence-spine"
type: change
state: active
intent:
  summary: "M2 redo checkpoint:把 intelligence 收回 skill,落地 Claude plugin/hooks、MCP 六 capability、ingest/distill/query 三 skill,并补齐 scope/commit/timeline/graph 的确定性 engine spine"
  detail: |
    本批把 006–010 的裁决落成可本地验证的开发态闭环骨架:

    - plugin:manifest + hooks.json + stdio MCP 配置;SessionStart 路由
      vibehub-query/vibehub-ingest,Stop pending 注入按官方顶层
      decision:block + reason 唤醒,B2 越界提醒每份 scope 一次;
    - skill intelligence:新增 vibehub-ingest、vibehub-distill、
      vibehub-query,跨工具拆解/检索/综合 workflow 全住 skill;
    - MCP:register_scope/self_report/kb_retrieve/kb_record/get_manual/
      kb_apply_distillation 六 capability,description 只描述能力、机械契约与
      skill 路由,stdio runtime 从 cwd 机械解析 repo/task;
    - core:raw repo-relative glob scope registry + 唯一 matcher;task 首捕保存
      start_head_sha,commit 从 start_head_sha..HEAD 读侧派生并与 stored hook
      events 合并成 timeline;GraphStore 支持七 spec 类型、server id、
      stale/supersede、manifest 整批 apply 与 retrieve;SQLite 升至 v5;
    - injection:CLI 支持 mode/context/db,locus 随队列送达,本地探针已证明
      CLI → SQLite → hook output 链路。

    验证:core 125 tests,MCP 5 tests;core/cli/MCP typecheck+build;Claude plugin
    strict validation;MCP stdio list/call 与本地 injection delivery probe 全绿。
    真实外部 Claude dogfood 因会向外部模型发送 private repo/plugin context,
    留到用户明确授权后执行;M2 因而保持 in_progress。Tauri 打包按 010 后置。
