spec_id: "change-2026-07-18-codex-activation-parity"
type: change
state: active
intent:
  summary: "M2p6e native adapter checkpoint：Claude Code/Codex 共用一套 SQLite、repo identity、skills、MCP 与 receipts；Codex 原生插件、host-neutral hook ingestion 和隔离安装烟测已落地"
  detail: |
    Plan B 按“薄宿主适配，不改造核心”落地。core 新增 host-neutral canonical
    hook event/delivery contract；原 Claude ingest 保持兼容 wrapper，Claude
    与 Codex adapter 只负责 payload mapping、session/prompt identity namespace
    与各自 output projection。两端继续调用同一 transaction、claim、checkpoint、
    scope、SQLite 和 Git common-root identity，不复制 intelligence 或状态机。

    Codex 原生包由 .codex-plugin/plugin.json + codex/hooks.json +
    codex/mcp.json 组成，共享原 skills/、CLI 与 MCP。hook 默认接入经验证的
    SessionStart、UserPromptSubmit、PostToolUse(apply_patch)：可形成 Codex
    host-attributed handshake/user-turn/edit evidence，投递 queued context，
    执行 task-scoped checkpoint cadence 和 off-scope reminder。apply_patch
    多路径由 patch header 机械抽取；带 agent_id 的 subagent prompt/tool 事件
    在打开 DB 前忽略，不能抢 root injection claim。

    宿主边界保持诚实：Codex 默认包暂不接 Stop/SessionEnd/Notification/failure
    events，因此不承诺 stop-time wake-up、自动 done、question event 或 Bash
    read footprint。缺口不以 watcher、log tail、轮询、transcript parser 或
    semantic hook state machine 补齐。Connected 仍只由 exact checkout 上真实、
    trusted 的 Codex SessionStart 证明；marketplace/install receipt、synthetic
    fixture 或 /hooks approval 单独都不是 handshake。真实交互式 Codex task
    dogfood（fresh task、/hooks trust、setup status、skills/MCP 调用）仍 pending。

    packaging gate 构建 disposable local marketplace，并用真实
    `codex plugin marketplace add` / `codex plugin add` 在隔离 CODEX_HOME
    安装。Codex 安装器不保留 pnpm symlink，artifact builder 因而以 hoisted
    deploy 生成自包含 CLI/MCP，并用 8000 files/100 MiB release budget 防止
    重复依赖膨胀；核心源码不变。安装后的 SessionStart hook 已输出共享协议。
    MCP 以 plugin-relative entrypoint 启动，并从 Codex MCP workspace roots
    解析 exact Git repo identity；真实 `codex app-server` 已证明 installed
    VibeHub MCP 在目标 repo thread 中由 starting 进入 ready。Codex 与 Claude
    的 artifact 验证共用同一 builder，阻止路径逃回开发 checkout。

    当前 controller 证据：Core 266/266、CLI 48/48、MCP 19/19、App 65/65、
    production E2E 27/27、typecheck 与 workspace build 全绿；verify:artifact
    及 dogfood 通过；verify:codex-plugin 通过真实隔离 marketplace ingestion、
    installed hook 与真实 Codex app-server MCP ready gate。
    独立对抗复审与真实交互式双宿主 dogfood尚未完成，不在此冒充收官。
constraints:
  - kind: must
    rule: "Codex 与 Claude 共用同一 SQLite、repo/worktree identity、setup primitives 与 Installed/Connected/Activated 定义；能力缺口只能诚实降级表述"
  - kind: must
    rule: "宿主 adapter 只做 payload/output/config 翻译；hook intelligence、第二状态机、第二数据库均禁止"
  - kind: must_not
    rule: "不得以 file watcher、log tail、轮询、transcript parser 或 synthetic invocation 伪造真实 trusted host handshake"
  - kind: must_not
    rule: "Stop/SessionEnd 等未完成 attribution 与语义验证的事件不得加入默认 Codex hook package"
