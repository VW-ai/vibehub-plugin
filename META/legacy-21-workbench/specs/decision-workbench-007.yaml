spec_id: "decision-workbench-007"
type: decision
state: active
intent:
  summary: "微协议文本已裁:B1 四义务+manual 指针、B2 给台阶双分支、B3 current-task 包装+locus,pause>inject 批量最严胜出;Stop 用 decision:block+reason 唤醒,其余送达点用 additionalContext;统一 [Vibehub] 前缀、全英文;文本改动留 spec 痕"
  detail: |
    Wayne 2026-07-12 已批准 B1/B2/B3 与 locus。终稿见
    design-claude-code-integration.md §2 与 hook-ingest.ts。

    **四组与触发条件/预算/预期行为:**
    1. **B1 SessionStart 行为协议**(普通 session;每 session 一次,resume/compact
       重注):候选 A 命令式全款 ~110 tok / B 讲为什么 ~75 / C 极简铁四条 ~45。
       预期:动手前 register_scope、陌生区前 kb_retrieve、决策当场 kb_record、
       方向变 self_report。
    2. **B1-meta 编排席角色**(SessionStart 且 VIBEHUB_SESSION_ROLE=meta,
       app 发射时设环境变量;M3+ 才有真消费者,文本先定):候选 A ~90 / B ~40。
       预期:只编排不干活;空写 scope 由 020 twist 自守。
    3. **B2 scope 越界自报提醒**(PostToolUse 机械探测 edit 足迹越出当前声明
       write scope,每份 scope 声明至多一次、re-register 重置,022 硬条款
       + Wayne 2026-07-12 裁决;候选文本中 "this session" 措辞随之调整):候选 A 给台阶双分支 ~55 /
       B 极简 ~30 / C 问句式。预期:真转向→self_report+register_scope;
       顺手小改→忽略不产生噪音。
    4. **B3 注入送达包装**(队列非空时,送达点 UserPromptSubmit/PostToolUse/
       Stop/SessionStart-resume):inject 模式候选 A 叙事包装 ~25 / B 现 M1
       极简格式;pause 模式候选 A 全款 ~45 / B 短款。多条 pending FIFO 合并
       一块;含任一 pause 则整块按 pause 包装(最严语义胜出)。

    **通用规则**:全英文(token 效率+通用性);[Vibehub] 前缀标来源;
    语气(命令式 vs 提示式)是 Wayne 手感裁决项——候选刻意横跨两种语气。

    **Wayne 2026-07-12 裁决:**
    - B1 初裁 = 候选 A("不要太极简");
    - 新提案①:B1 尾部加 manual 指针一行(+~18 tok,"when you need it,
      not before starting work"),配套 MCP get_manual 工具(008/C4);
    - 新提案②:B3 送达包装加注入现场上下文(injection locus)——app 端
      入队时机械附带用户写留言时看着的 UI locus(冲突卡/事件/文件),
      包装头部一行人话;injections 表加可空 context 列,CLI 透传零 LLM;
    - 里程碑分类改向(详见 006/设计文档 块D 修正提案):三分类 →
      精准优先二值,漏判留默认档,ambiguous 桶或不再需要。

    **2026-07-12 顾问 session 五条建议消化(本 session 逐条评审后入档):**
    - B1 ✅ 已终裁(Wayne 2026-07-12 口头):候选 A(四义务命令式)+
      manual 指针行;候选 D(两义务混合)出局——token 差价小,协议要
      承担"开场即让 agent 知道全部 MCP 工具存在"的职能,description
      在 deferred loading 下不保证可见,四条全列=存在感本身;
    - B2 推荐 A、B3 inject 推荐 A(防注入被当新任务重规划),已标注;
    - B1-meta 标 DEFERRED(M3+ 连场景一起过,不进卡点 2 裁决面);
    - 文本终裁权交块 E 实证:服从率为一等指标,人逐条读后定稿。
