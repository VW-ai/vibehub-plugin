spec_id: "decision-workbench-006"
type: decision
state: draft
intent:
  summary: "Claude Code hook 清单矩阵:v1 接线九事件(六旧 + SubagentStart/Stop、PostToolUseFailure、StopFailure collect-only);稳态逐 hook 注入=0,无条件注入仅 SessionStart 协议一处;Stop 送达即唤醒;robustness 判决=内置 hooks(公开契约)+失联机械检测,不自建 session 监听器,降级走 021 弱档"
  detail: |
    ⛔ 卡点 1 待 Wayne 审。全矩阵与逐事件官方能力事实见
    design-claude-code-integration.md 块A(能力表 2026-07-12 抓自
    code.claude.com/docs/en/hooks,非凭记忆)。

    **v1 接线集(采什么/注什么/预算):**
    | Hook | 采集 | 注入(条件) | 预算 |
    | SessionStart(全 source) | session 出生+source+agent_type | 行为协议(每 session 一次;resume/compact 重注因 context 已丢;meta/普通分流)+ pending 顺带送达 | ≤120 |
    | UserPromptSubmit | launch/user_injection + prompt_id + 里程碑机械分类 | pending 送达(仅非空) | 0 稳态 |
    | PostToolUse(Edit|Write|MultiEdit|NotebookEdit|Read matcher) | 足迹 | pending 送达 + scope 越界提醒(仅机械探测越界后,每 session 至多一次) | ≤50 一次性 |
    | Notification(needs_input 类) | question→waiting | 无(能力上不可注) | 0 |
    | Stop | self_report 原话 | pending 送达(送达即唤醒——Stop 的 additionalContext 让对话继续,异步注入最速通道) | 0 稳态 |
    | SessionEnd | end reason→done | 无 | 0 |
    | SubagentStart/Stop(新) | 子 agent 谱系 | 无 | 0 |
    | PostToolUseFailure(新) | error_message(stalled 佐证) | 无 | 0 |
    | StopFailure(新) | API 错误类型→statusDetail | 无(CC 忽略输出) | 0 |
    不接线:PreToolUse/Permission*(不做门禁)、Pre/PostCompact(SessionStart
    source=compact 已覆盖)、TaskCreated/TeammateIdle 等 CC 自家生命周期
    (与我们的"事"不同构)、ConfigChange/FileChanged 等环境杂音、
    Elicitation*/Worktree*/Setup(非采集面)。

    **注入预算总账(单 session 稳态)**:协议 ≤120 一次 + 越界提醒 ≤50 至多
    一次 + 队列送达(用户主动行为不计侵蚀)。逐 hook 稳态 = 0(026 硬约束)。

    **robustness(Wayne 2026-07-12 疑虑的判决):**
    - settings 失联机械可测:repo 有新 commit 而 sessions 表零新行 →
      UI 诚实横幅 + `vibehub init` 幂等重接;
    - transcript-watcher(监听 ~/.claude/projects)= Plan B 不建:
      transcript 格式是私有实现,churn 风险高于文档化 hooks API;
    - 真降级 = decision-project-021 弱信号档(file-watcher+进程存在性),
      架构里已有,不为 robustness 新发明监听器。
constraints:
  - kind: must
    rule: "稳态逐 hook 注入为零;无条件注入仅 SessionStart 行为协议一处(026)"
  - kind: must_not
    rule: "vibehub hook 永不阻断(恒 exit 0,不用 exit 2 / decision:block)"
  - kind: must_not
    rule: "不自建 session 监听器;降级路径 = 021 弱信号档"
indexing:
  type: decision
  priority: P0
  layer: feature
  domain: "workbench"
  tags: [claude-code, hooks, injection-budget, robustness, collection-matrix]
provenance:
