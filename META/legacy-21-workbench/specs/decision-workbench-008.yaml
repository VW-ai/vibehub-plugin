spec_id: "decision-workbench-008"
type: decision
state: active
intent:
  summary: "MCP 六 capability(register_scope/self_report/kb_retrieve/kb_record/get_manual/kb_apply_distillation)= 确定性端点 + 质量闸(db 唯一写门);description 只承担 capability/机械契约/轻量 skill 路由,跨工具方法论与判断只住 skill 包(009/010);record 支持七类型+server 生 id,无 delete;distillation manifest 单事务 apply;GitHub-why-not:GitHub 无运行中 session 概念,scope/注入/本地语义图皆事中态,PR/issue 皆事后工件"
  detail: |
    Wayne 2026-07-12 已批准六 capability 与 intelligence ownership。
    description + JSON Schema 见 design-claude-code-integration.md §3/附表B。

    **【勘误 2026-07-12】本 spec 初稿把工具面当成"接口即全部"——
    description 承载全部行为引导、产品不带 skill。该框架系谬误(成因
    复盘见 009/010):description 只允许 capability/机械契约/轻量 skill 路由,
    ingest/distill/query 的方法论与跨工具策略必须完整住 skill 包;工具本体的正确定位 = 确定性
    端点 + 质量闸(schema 校验/查重预检/supersede 链完整性,机器不放水,
    不合格打回),kb_record 的 description 明确指路 vibehub-ingest skill。
    以下原文按此勘误校正解读。**

    **工具面(025 三组的落名):**
    1. `register_scope` — 任务开工前调一次,工作漂移再调;status 一句人话 +
       write/read path-glob 数组。自报叙事版与 scope 数据版同一动作(022);
       声明宽不罚(020)。重调即替换 = 状态更新通道。
    2. `self_report` — 一句话现在在干嘛/刚完成啥;计划变、大步完成、
       收到越界提醒后调。区域也变了则改调 register_scope(两者都更新)。
    3. `kb_retrieve` — 碰陌生区前/架构选择前/用户问 why 时查决策图;
       按 topic 或 file path 查;description 明写 "cheap and local —
       when in doubt, call it"。
    4. `kb_record` — 决策发生当场记录,不攒批不等问;one entry = one fact;
       **无 delete**:改错传 supersedes(版本链),废弃传 marks_stale。
       产出落 draft 态,人晨审 promote(现行 fr 纪律不变)。
    5. `kb_apply_distillation` — distill skill 产出 manifest 的确定性 apply 门;
       批量校验 feature/anchor/relation 引用与 repo-relative path,单事务写入,
       成功后重算 layout。语义拆解不得下沉到此工具。

    `kb_record.type` 锁定为七类(intent/decision/constraint/convention/
    contract/context/change);spec id 由 server 生成,skill 不得按 id 覆盖节点。

    retrieve 排序/裁剪策略后续吃 Victor plugin 蒸馏的三档拉取表(026 判定
    可复用约六七成 C/R/U 领域逻辑)。

    **新提案(Wayne 2026-07-12 口述,待卡点 3 裁):第五工具 get_manual**
    ——只读,返回 agent-facing manual(系统全貌/用户看到什么/好公民准则);
    B1 协议保持极短,深语境外置到这个把手;description 明写 "don't read
    it up front for routine tasks" 防开工烧 context。全文见设计文档 C4。

    **已知张力(记档不改 v1)**:register_scope 的"声明宽不罚"与越界
    提醒/冲突精度互斥——wide 声明(**/*)让两者双双失效;v1 接受,
    日后满屏 wide 声明时此处是根因,杠杆在 description 措辞或 UI 弱化。

    **GitHub 为什么做不到(009 必答)**:scope registry 是活 session 的
    实时声明、注入是往运行中 agent 推消息、决策图是本地 SQLite 语义层——
    GitHub 没有"正在跑的 session"这个实体,PR/issue/commit 全是事后工件,
    无一承载事中态。三组全部自研,与 GitHub 零重叠。
clarifications:
  - date: "2026-07-13"
    kind: "breaking_api_correction"
    detail: |
      ⑤E whole-branch integrity review 证明 `kb_record` 与
      `kb_apply_distillation` 的已注册实现只会返回 unsupported_operation,
      无法兑现本决策原拟的持久化承诺。MCP server v0.2 因而从 advertised
      surface 移除这两个名称,不伪造 server-generated evidence/hash,也不绕过
      versioned distillation run。当前六工具为 register_scope、self_report、
      kb_retrieve、kb_operation、distill_operation、get_manual;写入分别经
      canonical public operation contract,语义 workflow 继续由 ingest/distill
      skills 持有。本 clarification 取代上文旧工具名/manifest 单事务入口的
      当前适用性,保留原文作为 2026-07-12 设计演进记录。
constraints:
  - kind: must
    rule: "description 只住 capability/机械契约/轻量 skill 路由;语义 workflow、查询策略与综合判断只住 skill 包(009/010)"
  - kind: must_not
    rule: "沉淀面无 delete 操作;修正只走 supersedes / marks_stale"
  - kind: must_not
    rule: "MCP server 不实现业务逻辑,只做 core 之上的薄适配(013)"
