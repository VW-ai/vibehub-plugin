spec_id: "decision-workbench-003"
type: decision
state: active
intent:
  summary: "Use subject-first language for both single-subject tasks and multi-subject conflicts"
  detail: |
    A single-subject row is labeled by the Task. A multi-subject row is labeled
    by the contested resource plus a participant-count pill; participants appear
    on expansion. Attention counts treat each unresolved conflict pair as one
    item rather than counting every participating Task.
constraints:
  - kind: must
    rule: "Rows must identify their actual subject rather than reuse a Task-only label for multi-subject entities"
