spec_id: "change-2026-07-18-codex-activation-parity"
type: change
state: active
intent:
  summary: "Added a thin native Codex adapter sharing the same runtime and a real isolated Codex marketplace gate"
  detail: |
    Claude and Codex share SQLite, repo/worktree identity, skills, MCP and
    receipts. The Codex adapter only maps host events and output. Its default
    package wires verified SessionStart, UserPromptSubmit and PostToolUse
    apply_patch evidence; absent lifecycle events remain honestly absent.
    Isolated verification installs the real marketplace, executes the installed
    hook and proves the installed MCP reaches ready in a real Codex app-server.
constraints:
  - kind: must
    rule: "Codex and Claude must share one runtime and one semantic contract"
  - kind: must_not
    rule: "Missing Codex lifecycle signals must not be fabricated with watchers, log tailing or transcript parsing"
