spec_id: "change-2026-07-19-claude-marketplace"
type: change
state: active
intent:
  summary: "Added a self-contained Claude marketplace and real isolated installed-runtime verification"
  detail: |
    The release builder packages CLI, MCP, skills, hooks and production native
    dependencies. A real isolated Claude CLI validates the marketplace, installs
    it, and executes configured hook, MCP and setup paths from the returned
    install directory. Safety checks prove negative tests cannot mutate a real
    user plugin cache.
constraints:
  - kind: must
    rule: "Claude release verification must execute from the installed artifact, not the source tree"
  - kind: must
    rule: "Installed-path mutation tests must first prove the path belongs to the isolated host home"
